          <div class="post-body-retro">
            <p>今はロサンゼルスのローカルで仕事をしています。来週からヨーロッパに6週間いくので、そのいくまでの間はロサンゼルスにいます。</p>
<p>ヨーロッパのあとは6週間のアジアツアー。日本から始まり最後は行ったことのない国で終わりそうです。スケジュール的にタイトだけど、空いている時間で他のやるべき事やらないとね。</p>
<p>スーツケース、壊れたままいくかー。</p>
